<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>CHRTV Geofence Management</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                      "surface-container-low": "#191b24",
                      "on-secondary-container": "#adb4ce",
                      "inverse-surface": "#e2e1ef",
                      "on-primary-container": "#efefff",
                      "status-gray": "#64748B",
                      "on-primary-fixed-variant": "#0035be",
                      "surface": "#11131c",
                      "primary-container": "#2e5bff",
                      "surface-sidebar": "#0F172A",
                      "secondary-container": "#3f465c",
                      "on-secondary-fixed-variant": "#3f465c",
                      "tertiary-fixed-dim": "#ffb59b",
                      "error-container": "#93000a",
                      "surface-dim": "#11131c",
                      "outline": "#8e90a2",
                      "inverse-primary": "#124af0",
                      "status-green": "#10B981",
                      "surface-card": "#1E293B",
                      "surface-bright": "#373943",
                      "secondary-fixed": "#dae2fd",
                      "background": "#11131c",
                      "surface-container-highest": "#33343e",
                      "border-subtle": "#334155",
                      "surface-tint": "#b8c3ff",
                      "error": "#ffb4ab",
                      "on-primary": "#002388",
                      "on-surface": "#e2e1ef",
                      "on-error": "#690005",
                      "inverse-on-surface": "#2e303a",
                      "tertiary-container": "#c24100",
                      "on-tertiary-fixed": "#380d00",
                      "text-secondary": "#94A3B8",
                      "surface-container-lowest": "#0c0e17",
                      "on-tertiary": "#5b1a00",
                      "on-background": "#e2e1ef",
                      "surface-variant": "#33343e",
                      "outline-variant": "#434656",
                      "on-secondary": "#283044",
                      "surface-container": "#1d1f29",
                      "on-error-container": "#ffdad6",
                      "tertiary": "#ffb59b",
                      "background-main": "#0B0E14",
                      "on-tertiary-fixed-variant": "#812800",
                      "secondary": "#bec6e0",
                      "on-secondary-fixed": "#131b2e",
                      "on-primary-fixed": "#001356",
                      "on-surface-variant": "#c4c5d9",
                      "primary-fixed": "#dde1ff",
                      "status-yellow": "#F59E0B",
                      "primary": "#b8c3ff",
                      "secondary-fixed-dim": "#bec6e0",
                      "surface-container-high": "#282933",
                      "status-red": "#EF4444",
                      "tertiary-fixed": "#ffdbcf",
                      "text-primary": "#F8FAFC",
                      "primary-fixed-dim": "#b8c3ff",
                      "on-tertiary-container": "#ffece6"
              },
              borderRadius: {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              spacing: {
                      "gutter": "16px",
                      "sidebar-width": "260px",
                      "navbar-height": "64px",
                      "base": "8px",
                      "container-margin": "24px"
              },
              fontFamily: {
                      "body-lg": ["Inter"],
                      "headline-lg": ["Inter"],
                      "label-md": ["Inter"],
                      "headline-xl": ["Inter"],
                      "headline-md": ["Inter"],
                      "body-md": ["Inter"],
                      "mono-data": ["Inter"]
              },
              fontSize: {
                      "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                      "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                      "headline-xl": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                      "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "500"}],
                      "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                      "mono-data": ["14px", {"lineHeight": "20px", "fontWeight": "600"}]
              }
      },
          },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .skeleton {
            background: linear-gradient(90deg, #1e293b 0%, #2d3748 50%, #1e293b 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="bg-background-main text-on-background font-body-lg text-body-lg h-screen overflow-hidden flex">

    <!-- Mobile overlay for sidebar -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden" onclick="closeSidebar()"></div>

    <!-- SideNavBar (off-canvas on mobile) -->
    <aside id="sidebar" class="fixed left-0 top-0 h-screen w-[260px] z-50 bg-slate-950 border-r border-slate-800 flex flex-col py-6 transform -translate-x-full md:translate-x-0 transition-transform duration-300">
        <div class="px-6 mb-8 flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center">
                <span class="material-symbols-outlined text-white text-xl">all_out</span>
            </div>
            <div>
                <h1 class="text-white font-bold font-inter text-sm font-semibold leading-tight">CHRTV Logistics</h1>
                <p class="text-slate-400 text-xs font-medium">Enterprise Control</p>
            </div>
        </div>
        <nav class="flex-1 px-2 space-y-1">
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-slate-200 hover:bg-slate-900/50 transition-all duration-200 rounded-lg"><span class="material-symbols-outlined text-[20px]">dashboard</span><span class="font-inter text-sm font-semibold">Dashboard</span></a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-slate-200 hover:bg-slate-900/50 transition-all duration-200 rounded-lg"><span class="material-symbols-outlined text-[20px]">explore</span><span class="font-inter text-sm font-semibold">Live Tracking</span></a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-slate-200 hover:bg-slate-900/50 transition-all duration-200 rounded-lg"><span class="material-symbols-outlined text-[20px]">local_shipping</span><span class="font-inter text-sm font-semibold">Fleet Management</span></a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 bg-blue-600/10 text-blue-500 border-r-2 border-blue-600 rounded-lg"><span class="material-symbols-outlined text-[20px] icon-fill">hub</span><span class="font-inter text-sm font-semibold">Logistics Hub</span></a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-slate-200 hover:bg-slate-900/50 transition-all duration-200 rounded-lg"><span class="material-symbols-outlined text-[20px]">bar_chart</span><span class="font-inter text-sm font-semibold">Analytics</span></a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-slate-200 hover:bg-slate-900/50 transition-all duration-200 rounded-lg"><span class="material-symbols-outlined text-[20px]">terminal</span><span class="font-inter text-sm font-semibold">Command Center</span></a>
        </nav>
        <div class="px-2 mt-auto space-y-1 border-t border-slate-800 pt-4">
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-slate-200 hover:bg-slate-900/50 transition-all duration-200 rounded-lg"><span class="material-symbols-outlined text-[20px]">help</span><span class="font-inter text-sm font-semibold">Support</span></a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-slate-200 hover:bg-slate-900/50 transition-all duration-200 rounded-lg"><span class="material-symbols-outlined text-[20px]">logout</span><span class="font-inter text-sm font-semibold">Sign Out</span></a>
        </div>
    </aside>

    <!-- Main Content Wrapper -->
    <div class="flex-1 flex flex-col h-screen md:ml-[260px] ml-0 transition-all duration-300">
        <!-- TopNavBar -->
        <header class="sticky w-full top-0 z-30 bg-slate-900 border-b border-slate-800 shadow-sm flex items-center px-4 lg:px-6 h-16 shrink-0 gap-4">
            <button id="menu-toggle" class="md:hidden p-1 text-slate-400 hover:text-white" onclick="toggleSidebar()">
                <span class="material-symbols-outlined text-[28px]">menu</span>
            </button>
            <div class="flex items-center gap-4 flex-1">
                <div class="relative w-full max-w-md">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">search</span>
                    <input class="w-full bg-slate-950 border border-slate-800 rounded-lg pl-10 pr-4 py-2 text-sm text-slate-200 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all placeholder:text-slate-500" placeholder="Search geofences, addresses..." type="text"/>
                </div>
            </div>
            <div class="flex items-center justify-end gap-2">
                <div class="hidden md:block text-xl font-black tracking-tighter text-white">CHRTV</div>
                <button class="p-2 text-slate-400 hover:bg-slate-800 hover:text-white transition-colors rounded-full"><span class="material-symbols-outlined text-[22px]">notifications</span></button>
                <button class="p-2 text-slate-400 hover:bg-slate-800 hover:text-white transition-colors rounded-full"><span class="material-symbols-outlined text-[22px]">help</span></button>
                <button class="p-2 text-slate-400 hover:bg-slate-800 hover:text-white transition-colors rounded-full"><span class="material-symbols-outlined text-[22px]">settings</span></button>
                <div class="ml-4 pl-4 border-l border-slate-800">
                    <img alt="Profile" class="w-8 h-8 rounded-full border border-slate-700 object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAKtSuZ0uwFXT1pKjgFz1k1aQQb-tHb6DUwkZiT6mL3Do6anLKrcv06t5tW_NwQl3fsNTlQjKJLn6O_OiQ479EjVumzhYoizVGltJECW8vt3Lk7u-ikiOLUAF_sVe5QdHB6rGJ-3q3Tk5tRwCEA2jm0DLPKQgAn65y7uioE2WA6ZYXi32Xt3DlwLhHvfDZxov-8QNLkqI7VFjg8i1iELH-Pe7D985aFyfEpsE8_q-VLFq6q6xFxDGbfuQoDBr760PbvmIukaUD9lMVw"/>
                </div>
            </div>
        </header>

        <!-- Main Canvas -->
        <main class="flex-1 flex overflow-hidden bg-background-main relative">
            <!-- Map Area -->
            <section class="flex-1 relative">
                <!-- Background Map -->
                <img alt="Dark theme digital map" class="absolute inset-0 w-full h-full object-cover opacity-80 mix-blend-luminosity" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBplcGMxwQZvmdAYYFsQk3FWX3YrMD4sY1k5NOF-I-fgPmhWIi_TzEsgk5qyf2KunYSC5dEkLSfVBdNAr2GEoEZmogQhwKYjaHx192uW8vNpJLm-pUBmG4Mle2b17CCFIPJymr3KejQR9TK4bacLPkVV9-eNkAKd23qx41lk_OVhn1afx9bD096WzJcJ9jvF-KIzUpvX_V74M-UXIGWg5m9S_iICvAWhtdf2E9KOoGUDumHYTCDA2IUPBKbXtHh1BNwvqlP8epOlVre"/>
                <div class="absolute inset-0 bg-gradient-to-t from-background-main via-transparent to-transparent opacity-50 pointer-events-none"></div>
                <!-- Dynamic Geofence Overlays -->
                <svg id="geofence-overlays" class="absolute inset-0 w-full h-full pointer-events-none" viewBox="0 0 100 100"></svg>
                <!-- Drawing Tools (static for now) -->
                <div class="absolute top-4 left-4 bg-surface/80 backdrop-blur-md border border-border-subtle p-2 rounded-xl flex flex-col gap-2 shadow-[0_8px_30px_rgb(0,0,0,0.4)] z-10">
                    <button class="w-10 h-10 flex items-center justify-center rounded-lg bg-primary-container text-white shadow-sm hover:bg-blue-500 transition-colors" title="Select Tool"><span class="material-symbols-outlined text-[20px]">near_me</span></button>
                    <div class="w-8 h-px bg-border-subtle mx-auto my-1"></div>
                    <button class="w-10 h-10 flex items-center justify-center rounded-lg text-text-secondary hover:bg-surface-bright hover:text-text-primary transition-colors" title="Draw Polygon"><span class="material-symbols-outlined text-[20px]">polyline</span></button>
                    <button class="w-10 h-10 flex items-center justify-center rounded-lg text-text-secondary hover:bg-surface-bright hover:text-text-primary transition-colors" title="Draw Circle"><span class="material-symbols-outlined text-[20px]">radio_button_unchecked</span></button>
                    <button class="w-10 h-10 flex items-center justify-center rounded-lg text-text-secondary hover:bg-surface-bright hover:text-text-primary transition-colors" title="Draw Rectangle"><span class="material-symbols-outlined text-[20px]">rectangle</span></button>
                </div>
                <!-- Zoom Controls -->
                <div class="absolute bottom-4 right-4 flex flex-col gap-2 z-10">
                    <div class="bg-surface/80 backdrop-blur-md border border-border-subtle rounded-xl flex flex-col shadow-lg overflow-hidden">
                        <button class="w-10 h-10 flex items-center justify-center text-text-secondary hover:bg-surface-bright hover:text-text-primary transition-colors border-b border-border-subtle"><span class="material-symbols-outlined text-[20px]">add</span></button>
                        <button class="w-10 h-10 flex items-center justify-center text-text-secondary hover:bg-surface-bright hover:text-text-primary transition-colors"><span class="material-symbols-outlined text-[20px]">remove</span></button>
                    </div>
                </div>
            </section>

            <!-- Right Side Panel (Desktop: fixed width, Mobile: bottom sheet) -->
            <div id="panel-overlay" class="hidden lg:hidden fixed inset-0 bg-black/50 z-40" onclick="togglePanel()"></div>
            <aside id="geofence-panel" class="w-full lg:w-[400px] bg-surface border-l border-border-subtle flex flex-col shrink-0 z-20 shadow-[-10px_0_30px_rgba(0,0,0,0.5)] 
                fixed lg:relative right-0 top-0 lg:top-auto h-full lg:h-auto max-h-screen overflow-hidden transition-transform duration-300
                transform translate-x-0 lg:translate-x-0">
                <!-- Drawer Header -->
                <div class="p-4 border-b border-border-subtle flex items-center justify-between bg-surface-container-low">
                    <div>
                        <h2 class="font-headline-md text-headline-md text-text-primary">Zone Management</h2>
                        <p id="zone-count" class="font-body-md text-body-md text-text-secondary mt-1">Loading...</p>
                    </div>
                    <button class="flex items-center gap-2 bg-primary-container hover:bg-blue-500 text-white px-4 py-2 rounded-lg font-label-md text-label-md transition-colors shadow-sm">
                        <span class="material-symbols-outlined text-[18px]">add</span> New Zone
                    </button>
                    <!-- Close button for mobile -->
                    <button class="lg:hidden text-text-secondary hover:text-white ml-2" onclick="togglePanel()">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>
                <!-- Filters -->
                <div class="p-4 border-b border-border-subtle bg-surface-container-lowest">
                    <div class="flex gap-2">
                        <button id="filter-all" class="flex-1 bg-surface-bright border border-outline-variant text-text-primary font-label-md text-label-md py-2 rounded-lg hover:border-primary transition-colors">All Types</button>
                        <button id="filter-active" class="flex-1 bg-surface-container border border-border-subtle text-text-secondary font-label-md text-label-md py-2 rounded-lg hover:bg-surface-bright transition-colors">Status: Active</button>
                    </div>
                </div>
                <!-- Zone List -->
                <div id="zone-list" class="flex-1 overflow-y-auto p-4 space-y-3">
                    <!-- Loading skeletons -->
                    <div class="skeleton h-32 rounded-xl"></div>
                    <div class="skeleton h-32 rounded-xl"></div>
                </div>
            </aside>
        </main>
    </div>

    <!-- Mobile Panel Toggle Button (floating) -->
    <button id="panel-toggle-btn" class="fixed bottom-6 right-6 z-30 lg:hidden w-12 h-12 rounded-full bg-primary-container text-white shadow-lg flex items-center justify-center" onclick="togglePanel()">
        <span class="material-symbols-outlined">layers</span>
    </button>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebar-overlay').classList.toggle('hidden');
        }
        function closeSidebar() {
            document.getElementById('sidebar').classList.add('-translate-x-full');
            document.getElementById('sidebar-overlay').classList.add('hidden');
        }
        function togglePanel() {
            const panel = document.getElementById('geofence-panel');
            const overlay = document.getElementById('panel-overlay');
            panel.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }
    </script>

    <script type="module" src="js/api.js"></script>
    <script type="module" src="js/ui.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>

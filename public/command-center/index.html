<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
        .skeleton {
            background: linear-gradient(90deg, #1e293b 0%, #2d3748 50%, #1e293b 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>

                        "tertiary-container": "#c24100",
                        "on-tertiary-fixed": "#380d00",
                        "text-secondary": "#94A3B8",

                        "sidebar-width": "260px",
                        "navbar-height": "64px",

                    fontFamily: {

<body class="bg-background-main text-on-background font-body-md text-body-md overflow-hidden h-screen flex">

    <!-- Mobile overlay for sidebar -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden" onclick="closeSidebar()"></div>

    <!-- SideNavBar (off-canvas on mobile) -->
    <nav id="sidebar" class="bg-slate-950 fixed left-0 top-0 h-screen w-[260px] z-50 border-r border-slate-800 flex flex-col py-6 transform -translate-x-full md:translate-x-0 transition-transform duration-300">
        <div class="px-6 mb-8 flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center shrink-0">
                <span class="material-symbols-outlined text-white text-sm">local_shipping</span>
            </div>
            <div>
                <h1 class="font-inter text-sm font-semibold text-white font-bold">CHRTV Logistics</h1>
                <p class="font-inter text-xs text-slate-400">Enterprise Control</p>
            </div>
        </div>
        <div class="flex-1 flex flex-col gap-1">
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-slate-200 hover:bg-slate-900/50 transition-all duration-200 font-inter text-sm font-semibold"><span class="material-symbols-outlined">dashboard</span><span>Dashboard</span></a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-slate-200 hover:bg-slate-900/50 transition-all duration-200 font-inter text-sm font-semibold"><span class="material-symbols-outlined">explore</span><span>Live Tracking</span></a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-slate-200 hover:bg-slate-900/50 transition-all duration-200 font-inter text-sm font-semibold"><span class="material-symbols-outlined">local_shipping</span><span>Fleet Management</span></a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-slate-200 hover:bg-slate-900/50 transition-all duration-200 font-inter text-sm font-semibold"><span class="material-symbols-outlined">hub</span><span>Logistics Hub</span></a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-slate-200 hover:bg-slate-900/50 transition-all duration-200 font-inter text-sm font-semibold"><span class="material-symbols-outlined">bar_chart</span><span>Analytics</span></a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 bg-blue-600/10 text-blue-500 border-r-2 border-blue-600 scale-[0.98] font-inter text-sm font-semibold"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">terminal</span><span>Command Center</span></a>
        </div>
        <div class="mt-auto flex flex-col gap-1 border-t border-slate-800 pt-4 px-2">
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-slate-200 hover:bg-slate-900/50 transition-all duration-200 font-inter text-sm font-semibold"><span class="material-symbols-outlined">help</span><span>Support</span></a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-slate-200 hover:bg-slate-900/50 transition-all duration-200 font-inter text-sm font-semibold"><span class="material-symbols-outlined">logout</span><span>Sign Out</span></a>
        </div>
    </nav>

    <!-- Main Content Wrapper -->
    <div class="flex-1 flex flex-col h-full bg-background-main md:ml-[260px] ml-0 transition-all duration-300">
        <!-- TopNavBar -->
        <header class="bg-slate-900 border-b border-slate-800 shadow-sm flex items-center w-full px-4 lg:px-6 h-16 shrink-0 gap-4">
            <button id="menu-toggle" class="md:hidden p-1 text-slate-400 hover:text-white" onclick="toggleSidebar()">
                <span class="material-symbols-outlined text-[28px]">menu</span>
            </button>
            <div class="flex items-center gap-6 flex-1">
                <div class="text-xl font-black tracking-tighter text-white">CHRTV</div>
                <!-- Search (optional) -->
                <div class="hidden lg:flex items-center bg-slate-950 border border-slate-800 rounded-full px-4 py-1.5 w-64">
                    <span class="material-symbols-outlined text-slate-400 text-sm mr-2">search</span>
                    <input class="bg-transparent border-none focus:ring-0 text-slate-200 text-sm w-full placeholder-slate-500 p-0" placeholder="Search devices..." type="text"/>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button class="p-2 text-slate-400 hover:bg-slate-800 hover:text-white transition-colors rounded-full"><span class="material-symbols-outlined">notifications</span></button>
                <button class="p-2 text-slate-400 hover:bg-slate-800 hover:text-white transition-colors rounded-full"><span class="material-symbols-outlined">help</span></button>
                <button class="p-2 text-slate-400 hover:bg-slate-800 hover:text-white transition-colors rounded-full"><span class="material-symbols-outlined">settings</span></button>
                <div class="ml-4 w-8 h-8 rounded-full bg-surface-bright border border-border-subtle overflow-hidden">
                    <img alt="Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDUi-kqnybsQ8MteIW28WOfaaMIr3elqRL9wI0vgaf6OQD2Cfyr-_pN89oFWrwioOA3etUE1DFydJjUzH6TO0qArzyFXMldWW8wtmHRYihHeuu-CNYaCUrnd8RW7gTge70ykJA8QsqkqFHsuOtaOkTxhnr8woohrS63WYrlDD4AgwyPU7DSudTZT0Dt9dkD21cLdHpR5pMgaWe8W6PDhN1NF4EONMTynmKT7k3t1tpYZOidzmdc0G79UVeCEL3XqLws_K_wDisry_oL"/>
                </div>
            </div>
        </header>

        <!-- Page Content -->
        <main id="command-content" class="flex-1 overflow-y-auto p-4 lg:p-container-margin">
            <!-- Loading state -->
            <div class="flex items-center justify-center h-full">
                <div class="text-center">
                    <div class="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                    <p class="text-text-secondary">Loading command center...</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebar-overlay').classList.toggle('hidden');
        }
        function closeSidebar() {
            document.getElementById('sidebar').classList.add('-translate-x-full');
            document.getElementById('sidebar-overlay').classList.add('hidden');
        }
    </script>
    <script type="module" src="js/api.js"></script>
    <script type="module" src="js/ui.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
